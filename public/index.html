<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050707">
  <title>airc tmux remote</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/app.css">
</head>
<body class="theme-dark">
  <header id="strip">
    <span id="dot" class="dot"></span>
    <span id="state">connecting</span>
    <button id="pane-label" title="pick pane">...</button>
    <span id="note"></span>
    <span id="alerts" hidden></span>
    <span id="dashboard"></span>
    <span class="spacer"></span>
    <button id="auto-toggle" title="follow the pane that needs you" hidden>auto</button>
    <button id="font-minus">A-</button>
    <button id="font-plus">A+</button>
    <button id="font-fit" class="active">Fit</button>
    <button id="controls-toggle" hidden>ctrl</button>
    <button id="theme-toggle">day</button>
    <button id="pause-toggle">pause</button>
  </header>
  <main id="term-wrap">
    <pre id="term"></pre>
    <div id="cursor" hidden></div>
  </main>
  <footer id="control-bar" hidden>
    <input id="control-text" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="text">
    <button id="control-send">send</button>
    <div id="control-ctrl-wrap">
      <button id="control-ctrl" title="control keys" aria-haspopup="true" aria-expanded="false">⌃</button>
      <div id="control-ctrl-menu" hidden>
        <button data-key="Escape">Esc</button>
        <button data-key="Tab">Tab</button>
        <button data-key="Backspace">BS</button>
        <button data-key="C-b">^B</button>
        <button data-key="C-c">^C</button>
        <button data-key="C-u">^U</button>
        <button data-key="C-w">^W</button>
        <button data-key="C-d">^D</button>
        <button data-key="C-l">^L</button>
        <button data-key="C-r">^R</button>
      </div>
    </div>
    <button id="control-up">Up</button>
    <button id="control-down">Down</button>
    <button id="control-enter">Enter</button>
  </footer>
  <div id="picker" hidden>
    <div id="picker-box">
      <div id="picker-title">panes</div>
      <div id="picker-list"></div>
      <button id="picker-close">close</button>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
